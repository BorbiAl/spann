services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: spann-valkey
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spann-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    depends_on:
      valkey:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spann-backend-worker
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.worker.celery_app", "worker", "--loglevel=INFO"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, redis; redis.Redis.from_url(os.environ.get('CELERY_BROKER_URL', 'redis://valkey:6379/0')).ping()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  backend-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spann-backend-beat
    env_file:
      - .env
    depends_on:
      valkey:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.worker.celery_app", "beat", "--loglevel=INFO"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, redis; redis.Redis.from_url(os.environ.get('CELERY_BROKER_URL', 'redis://valkey:6379/0')).ping()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  chat-server:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
    container_name: spann-chat-server
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    depends_on:
      valkey:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  mesh-relay:
    build:
      context: ./mesh-relay
      dockerfile: Dockerfile
    container_name: spann-mesh-relay
    env_file:
      - .env
    ports:
      - "8090:8090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    depends_on:
      valkey:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  mesh-daemon:
    build:
      context: ./mesh-daemon
      dockerfile: Dockerfile
    container_name: spann-mesh-daemon
    env_file:
      - .env
    environment:
      MESH_DAEMON_BIND: 0.0.0.0
      MESH_DAEMON_PORT: "7070"
    ports:
      - "7070:7070"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7070/health"]
      interval: 15s
      timeout: 5s
      retries: 5
