appId: app.spann.desktop
productName: Spann
copyright: Copyright © 2024-2025 Spann

directories:
  buildResources: public
  output: dist-release

files:
  - dist/**/*
  - desktop/**/*
  - package.json

extraMetadata:
  main: desktop/main.cjs

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Spann
  differentialPackage: true

publish:
  provider: github
  owner: spann-app
  repo: spann-desktop
  releaseType: release
