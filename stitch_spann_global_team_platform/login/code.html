<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Mica Effect Simulation */
        .mica-surface {
            background: rgba(249, 249, 249, 0.8);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
        }
        /* Acrylic Effect */
        .acrylic-surface {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Signature Gradient for CTAs */
        .btn-gradient {
            background: linear-gradient(135deg, #005faa 0%, #0078d4 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#004881",
                        "on-tertiary-fixed": "#001c38",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e2e2e2",
                        "surface-dim": "#dadada",
                        "outline-variant": "#c0c7d4",
                        "outline": "#717783",
                        "primary-fixed-dim": "#a3c9ff",
                        "tertiary-fixed": "#d3e4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#004883",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#9ecaff",
                        "surface-bright": "#f9f9f9",
                        "primary": "#005faa",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3f3",
                        "on-primary-fixed": "#001c39",
                        "on-secondary-fixed": "#001d36",
                        "on-secondary-fixed-variant": "#00497d",
                        "primary-container": "#0078d4",
                        "tertiary-container": "#3779bf",
                        "surface-container-high": "#e8e8e8",
                        "on-surface": "#1a1c1c",
                        "on-secondary-container": "#003f6d",
                        "background": "#f9f9f9",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#5badff",
                        "surface-tint": "#0060ab",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d3e3ff",
                        "secondary": "#0061a3",
                        "surface-container": "#eeeeee",
                        "on-background": "#1a1c1c",
                        "surface": "#f9f9f9",
                        "inverse-primary": "#a3c9ff",
                        "on-primary-container": "#ffffff",
                        "tertiary-fixed-dim": "#a2c9ff",
                        "inverse-surface": "#2f3131",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#404752",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#1160a4",
                        "on-tertiary-container": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#d1e4ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Mica Background Effect -->
<div class="fixed inset-0 -z-10 bg-surface">
<div class="absolute inset-0 opacity-40" data-alt="soft blue and white fluid gradients with subtle grain texture mimicking a microsoft windows 11 wallpaper aesthetic">
<div class="absolute inset-0 bg-gradient-to-br from-primary-fixed via-surface to-tertiary-fixed opacity-30"></div>
</div>
</div>
<!-- Fluent InfoBar (Global Notification) -->
<div class="fixed top-8 w-full max-w-md px-4 z-50">
<div class="bg-error-container text-on-error-container rounded-lg p-3 flex items-center gap-3 shadow-lg border border-error/10 animate-in fade-in slide-in-from-top-4 duration-300">
<span class="material-symbols-outlined text-[20px]">error</span>
<div class="flex-1 text-sm font-medium">Incorrect password. Please try again.</div>
<button class="hover:bg-on-error-container/10 p-1 rounded-full transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] px-6">
<!-- Auth Card -->
<div class="surface-container-lowest shadow-[0_32px_64px_rgba(0,0,0,0.08)] rounded-xl overflow-hidden relative">
<!-- Tonal Stacking: Acrylic Header -->
<div class="p-8 pb-10">
<div class="flex flex-col items-start gap-6">
<!-- Brand Identity -->
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dataset</span>
</div>
<span class="text-xl font-bold tracking-tight text-on-surface">Spann</span>
</div>
<div class="space-y-1">
<h1 class="text-2xl font-semibold text-on-surface">Sign in</h1>
<p class="text-[15px] text-on-surface-variant">Access your premium workspace</p>
</div>
</div>
<form class="mt-8 space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-[15px] transition-all placeholder:text-on-surface-variant/60" placeholder="Email, phone, or Skype" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<input class="w-full bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-[15px] transition-all placeholder:text-on-surface-variant/60" placeholder="Password" required="" type="password"/>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-1">
<label class="flex items-center gap-2 group cursor-pointer">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-[4px] checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary opacity-0 peer-checked:opacity-100 text-[16px] left-0.5" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-[14px] text-on-surface-variant group-hover:text-on-surface transition-colors">Remember email</span>
</label>
<a class="text-[14px] text-on-primary-fixed-variant hover:underline font-medium" href="#">Forgot password?</a>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 pt-6">
<button class="btn-gradient text-on-primary font-semibold py-2.5 rounded-lg shadow-md active:scale-[0.98] transition-all text-[15px]" type="submit">
                            Sign In
                        </button>
<div class="text-[14px] text-on-surface-variant">
                            No account? <a class="text-on-primary-fixed-variant hover:underline font-medium" href="#">Create an account</a>
</div>
</div>
</form>
</div>
</div>
<!-- Footer / Metadata -->
<footer class="mt-12 flex justify-center gap-6 text-[12px] text-on-surface-variant/60">
<a class="hover:text-on-surface-variant transition-colors" href="#">Terms of use</a>
<a class="hover:text-on-surface-variant transition-colors" href="#">Privacy &amp; cookies</a>
<span>© 2024 Spann</span>
</footer>
</main>
<!-- Contextual Decoration -->
<div class="fixed bottom-0 right-0 p-12 pointer-events-none opacity-20 hidden lg:block">
<div class="w-64 h-64 rounded-full bg-primary blur-[120px]"></div>
</div>
</body></html>
