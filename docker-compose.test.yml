version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spann-test-postgres
    environment:
      POSTGRES_DB: spann_test
      POSTGRES_USER: spann
      POSTGRES_PASSWORD: spann
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spann -d spann_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    container_name: spann-test-valkey
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
